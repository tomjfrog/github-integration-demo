name: Build NPM App in Docker Image and Publish
on: 
  workflow_dispatch:

permissions:
  actions: read # for detecting the Github Actions environment.
  id-token: write # for creating OIDC tokens for signing.
  packages: write # for uploading attestations.
  contents: read
  attestations: write
  security-events: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      CI: true
      JF_PROJECT: ${{ vars.JF_PROJECT_KEY }}
      JF_URL: https://${{ vars.JF_URL }}/
      NPM_VIRTUAL: ghdemo-npm
      BUILD_NAME: ghdemo-build
      OIDC_INTEGRATION_NAME: github-oidc-integration
      OIDC_AUDIENCE: jfrog-github
      PRODUCTION_REPO_NAME: npm-prod-local
      DOCKER_REGISTRY: tomjfrog.jfrog.io
      DOCKER_REPOSITORY: ghdemo-docker-local
      DOCKER_IMAGE_NAME: ghdemo-image
    defaults:
      run:
        working-directory: ./
    steps:
      # This action checks out the code from the repository
      - name: Checkout Code
        uses: actions/checkout@v4

      # Setup Buildx for Docker
      - name: Docker Setup Buildx
        uses: docker/setup-buildx-action@v3.12.0

      # Download the JFrog CLI and configure using JFrog Project and OIDC provider
      # Configuration will auto publish the BuildInfo into Artifactory 
      - uses: jfrog/setup-jfrog-cli@v4
        name: Setup JFrog CLI
        id: setup-cli
        env:
          JF_URL: ${{ vars.JF_URL }}/
          JF_PROJECT: ${{ vars.JF_PROJECT }}
          JF_GIT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
            version: latest
            oidc-provider-name: ${{ env.OIDC_INTEGRATION_NAME }}
            oidc-audience: ${{ env.OIDC_AUDIENCE }}
            disable-auto-build-publish: true
      
      # Ping the JFrog Platfrom instnace 
      - name: Validate Connectivity to JFrog Platform
        run: |
          jf rt ping

      # Log in to Artifactory-based private registry to push the Docker image
      - name: Log in to Docker Registry
        uses: docker/login-action@v4
        with:
          registry: tomjfrog.jfrog.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ steps.setup-cli.outputs.oidc-token }}

      # Configure JFrog CLI for NPM 
      - run: |
          jf npmc --repo-deploy=${{ env.NPM_VIRTUAL }} --repo-resolve=${{ env.NPM_VIRTUAL }}
      
      # Check to Ensure Dependencies Will Make it Past Curation
      - name: Run Curation Audit
        run: |
          jf curation-audit
      
      # Run Audit
      - name: Run Dependency Audit
        continue-on-error: true
        run: |
          jf audit --vuln --fail=false
            
      - name: Build and tag Docker image
        uses: docker/build-push-action@v6
        id: build-and-push
        with:
          context: .
          push: true
          provenance: true
          build-args: |
            "NPMRC_ENCODED=${{ secrets.NPMRC_ENCODED }}"
          tags: ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_REPOSITORY }}/${{ env.DOCKER_IMAGE_NAME }}:${{ github.run_number }}

      - name: Generate Generic Attestations
        uses: actions/attest@v4
        with:
          subject-name: oci://${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_REPOSITORY }}/${{ env.DOCKER_IMAGE_NAME }}
          subject-digest: ${{ steps.build-and-push.outputs.digest }}

      - name: Create image file for build-docker-create
        run: |
          echo "${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_REPOSITORY }}/${{ env.DOCKER_IMAGE_NAME }}:${{ github.run_number }}@${{ steps.build-and-push.outputs.digest }}" > image-file.txt
      
      - name: Add Image Metadata to Build Info
        run: |
          jf rt build-docker-create \
          --image-file=image-file.txt \
          ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_REPOSITORY }}
      
      # Publish the BuildInfo into Artifactory 
      - name: Publish Build Info
        run: |
          jf rt build-publish --collect-env --collect-git-info ${{ env.JFROG_CLI_BUILD_NAME }} ${{ env.JFROG_CLI_BUILD_NUMBER }} 
      
      # Run JF Scan on NPM Artifact 
      - name: Scan Artifact
        run: |
          jf docker scan ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_REPOSITORY }}/${{ env.DOCKER_IMAGE_NAME }}:${{ github.run_number }} --vuln
      
      # Scan the NPM Build with Xray 
      - name: Scan BuildInfo
        run: |
           jf build-scan ${{ env.JFROG_CLI_BUILD_NAME }} ${{ env.JFROG_CLI_BUILD_NUMBER }} --vuln
      
      # Promote the Build from Dev to Production 
      # - run: |
      #     jf rt build-promote ${{ env.JFROG_CLI_BUILD_NAME }} ${{ env.JFROG_CLI_BUILD_NUMBER }} ${{ env.PRODUCTION_REPO_NAME }}  --status=production
